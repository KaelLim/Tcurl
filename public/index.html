<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>TCurl - 慈濟短網址服務</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <!-- QR Code Styling Library -->
    <script type="text/javascript" src="https://unpkg.com/qr-code-styling@1.5.0/lib/qr-code-styling.js" integrity="sha384-CHvehSuS0IW8Qj9IlAETJXbHf/SEi62VXMgODXi9p3CC3NUIuThj1Y0uAFnl30VB" crossorigin="anonymous"></script>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }

        /* 打字動畫 */
        .typing-text {
            color: #60a5fa;
        }

        .typing-cursor {
            color: #60a5fa;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display">
    <button data-sidebar-toggle class="lg:hidden fixed top-4 left-4 z-50 text-white p-3 bg-[#111218] hover:bg-[#1a1d2e] rounded-lg transition-colors shadow-lg border border-white/10">
        <span class="material-symbols-outlined text-2xl">menu</span>
    </button>

    <div class="flex h-screen overflow-hidden">
        <tc-sidebar active="home"></tc-sidebar>

        <!-- Main Content -->
        <main class="flex-1 p-8 overflow-y-auto">
            <div class="max-w-4xl mx-auto">
                <!-- PageHeading -->
                <div class="flex flex-wrap justify-between gap-3 text-center mb-8">
                    <div class="flex w-full flex-col items-center gap-3">
                        <p class="text-white text-4xl sm:text-5xl font-black leading-tight tracking-[-0.033em]">
                            <span class="typing-text" id="typingText"></span><span class="typing-cursor">|</span>你的網址
                        </p>
                        <p class="text-white/90 text-base font-normal leading-normal">幾秒內生成短網址和 QR Code。管理和追蹤你的連結的終極工具。</p>
                    </div>
                </div>

                <!-- URL Input Form -->
                <div class="flex flex-col w-full items-stretch gap-4 rounded-xl border border-white/10 bg-white/5 p-4 sm:p-6 shadow-2xl shadow-black/20 mb-8">
                    <label class="flex flex-col w-full">
                        <p class="text-white text-sm font-medium leading-normal pb-2">原始網址</p>
                        <input id="originalUrl" class="form-input w-full resize-none overflow-hidden rounded-lg text-white focus:outline-0 focus:ring-2 focus:ring-primary/50 border border-white/20 bg-background-dark h-14 placeholder:text-white/60 p-[15px] text-base font-normal leading-normal transition-all" placeholder="貼上你的長網址..." value=""/>
                    </label>
                    <button id="shortenBtn" class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-lg h-14 px-5 bg-primary hover:bg-blue-600 transition-colors text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] shadow-[0_0_20px_theme(colors.primary/0.4)]">
                        <span class="material-symbols-outlined text-2xl">bolt</span>
                        <span class="truncate">縮短</span>
                    </button>
                </div>

                <!-- Results Display Card (Hidden by default) -->
                <div id="resultCard" class="hidden flex-col gap-6 rounded-xl border border-white/10 bg-white/5 p-6 shadow-2xl shadow-black/20">
                    <!-- 標題 -->
                    <h2 class="text-white text-[22px] font-bold leading-tight tracking-[-0.015em]">你的短網址已準備好</h2>

                    <!-- 短網址輸入區 -->
                    <div class="flex flex-col gap-4">
                        <label class="flex flex-col w-full">
                            <p class="text-white text-sm font-medium leading-normal pb-2">短網址</p>
                            <div class="relative flex items-center w-full">
                                <input id="shortUrl" class="form-input flex w-full min-w-0 flex-1 resize-none overflow-hidden rounded-lg text-primary focus:outline-0 focus:ring-0 border-0 bg-background-dark h-14 placeholder:text-white/60 p-[15px] text-base font-normal leading-normal pr-48" readonly="" value=""/>
                                <div class="absolute right-2 flex gap-1">
                                    <button id="copyBtn" class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded h-10 px-3 bg-white/10 hover:bg-white/20 text-white/90 hover:text-white gap-2 text-sm font-bold leading-normal tracking-[0.015em] transition-colors" title="複製短網址 /s/">
                                        <span class="material-symbols-outlined text-lg">content_copy</span>
                                        <span class="truncate">複製</span>
                                    </button>
                                    <button id="copyAdBtn" class="flex cursor-pointer items-center justify-center overflow-hidden rounded h-10 px-3 bg-orange-500/20 hover:bg-orange-500/30 text-orange-400 gap-2 text-sm font-bold leading-normal tracking-[0.015em] transition-colors" title="複製廣告頁連結 /ad/">
                                        <span class="material-symbols-outlined text-lg">ads_click</span>
                                    </button>
                                </div>
                            </div>
                        </label>
                        <div class="flex flex-col sm:flex-row gap-3">
                            <button id="shareBtn" class="flex flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-transparent border border-white/20 hover:bg-white/5 text-white/90 gap-2 text-base font-bold leading-normal tracking-[0.015em] transition-colors">
                                <span class="material-symbols-outlined text-xl">share</span>
                                <span class="truncate">分享</span>
                            </button>
                            <button id="viewLinksBtn" class="flex flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-transparent border border-white/20 hover:bg-white/5 text-white/90 gap-2 text-base font-bold leading-normal tracking-[0.015em] transition-colors">
                                <span class="material-symbols-outlined text-xl">list</span>
                                <span class="truncate">查看所有連結</span>
                            </button>
                            <button id="advancedBtn" class="flex flex-1 cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-transparent border border-white/20 hover:bg-white/5 text-white/90 gap-2 text-base font-bold leading-normal tracking-[0.015em] transition-colors">
                                <span class="material-symbols-outlined text-xl">tune</span>
                                <span class="truncate">進階功能</span>
                            </button>
                        </div>
                    </div>

                    <!-- QR Code 顯示區 -->
                    <div id="qrCodeDisplay" class="hidden flex flex-col items-center gap-4 mt-6">
                        <h3 class="text-white text-lg font-bold leading-tight tracking-[-0.015em]">QR Code</h3>
                        <div class="bg-white p-4 rounded-lg">
                            <!-- QR Code 容器 -->
                            <div id="qrCodeContainer"></div>
                        </div>
                        <button id="downloadQrBtn" class="flex cursor-pointer items-center justify-center overflow-hidden rounded-lg h-11 px-6 bg-white/10 hover:bg-white/20 text-white/90 hover:text-white gap-2 text-base font-bold leading-normal tracking-[0.015em] transition-colors">
                            <span class="material-symbols-outlined text-lg">download</span>
                            <span class="truncate">下載 QR Code</span>
                        </button>
                    </div>
                </div>

                <!-- Loading Indicator -->
                <div id="loadingIndicator" class="hidden flex items-center justify-center gap-3 text-white/90 mt-8">
                    <div class="animate-spin rounded-full h-6 w-6 border-b-2 border-primary"></div>
                    <span>處理中...</span>
                </div>
            </div>
        </main>
    </div>

    <!-- Typing Animation -->
    <script>
        (function() {
            const words = ['縮短', '分享', '追蹤']
            const typingText = document.getElementById('typingText')
            let wordIndex = 0
            let charIndex = 0
            let isDeleting = false

            const TYPING_SPEED = 200
            const DELETING_SPEED = 150
            const PAUSE_AFTER_WORD = 1800
            const PAUSE_AFTER_DELETE = 400

            function type() {
                const currentWord = words[wordIndex]

                if (!isDeleting) {
                    // 打字中：逐字增加
                    charIndex++
                    typingText.textContent = currentWord.substring(0, charIndex)

                    if (charIndex === currentWord.length) {
                        // 打完，暫停後開始刪除
                        setTimeout(() => {
                            isDeleting = true
                            type()
                        }, PAUSE_AFTER_WORD)
                        return
                    }
                } else {
                    // 刪除中：逐字減少
                    charIndex--
                    typingText.textContent = currentWord.substring(0, charIndex)

                    if (charIndex === 0) {
                        // 刪完，換下一個詞
                        isDeleting = false
                        wordIndex = (wordIndex + 1) % words.length
                        setTimeout(type, PAUSE_AFTER_DELETE)
                        return
                    }
                }

                setTimeout(type, isDeleting ? DELETING_SPEED : TYPING_SPEED)
            }

            // 開始動畫
            type()
        })()
    </script>

    <!-- Include Auth, API and Home JS -->
    <script src="/js/auth.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/home.js"></script>

    <!-- Auth State Handler -->
    <script>
        async function initPage() {
            const isAuthed = await requireAuth('/login.html')
            if (!isAuthed) return

            const sidebar = document.querySelector('tc-sidebar')
            const user = await auth.getUser()
            if (user) {
                const name = user.user_metadata?.full_name || user.user_metadata?.name || user.user_metadata?.display_name || user.email?.split('@')[0] || '使用者'
                const email = user.email || ''
                const avatar = user.user_metadata?.avatar_url || user.user_metadata?.picture || null
                sidebar.setUser({ name, email, avatar })
            }

            sidebar.addEventListener('tc-logout', async () => {
                try {
                    await auth.signOut()
                } catch (error) {
                    console.error('Logout error:', error)
                    utils.showNotification('登出失敗', 'error')
                }
            })
        }

        document.addEventListener('DOMContentLoaded', initPage)
    </script>

    <script type="module">
        import '/js/components/tc-sidebar.js';
    </script>
</body>
</html>
