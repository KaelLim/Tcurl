<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <link rel="icon" type="image/svg+xml" href="https://info.tzuchi.org/favicon.svg"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>登入 - TCurl 慈濟短網址服務</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-5xl">
        <!-- Logo & Title -->
        <div class="flex flex-col items-center gap-4 mb-8">
            <div class="flex items-center gap-3">
                <img src="https://info.tzuchi.org/favicon.svg" alt="TCurl Logo" class="w-16 h-auto">
                <div>
                    <div class="flex items-center gap-2">
                        <h1 class="text-white text-3xl font-bold">TCurl</h1>
                        <span class="px-1.5 py-0.5 text-xs font-bold bg-amber-500 text-black rounded">BETA</span>
                    </div>
                    <p class="text-white/90 text-sm">慈濟短網址服務</p>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="rounded-xl border border-white/10 bg-white/5 shadow-2xl shadow-black/20 overflow-hidden">
            <div class="grid md:grid-cols-2">
                <!-- Left: System Info -->
                <div class="p-6 sm:p-8 border-b md:border-b-0 md:border-r border-white/10">
                    <div class="flex items-center gap-2 mb-4">
                        <span class="material-symbols-outlined text-primary">info</span>
                        <h2 class="text-white text-xl font-bold">系統公告</h2>
                    </div>

                    <!-- Notice Banner -->
                    <div class="bg-amber-500/10 border border-amber-500/30 rounded-lg p-4 mb-6">
                        <p class="text-amber-400 text-sm">
                            目前為<strong>測試階段</strong>，請勿作為正式平台使用。
                        </p>
                    </div>

                    <p class="text-white/80 text-sm mb-6 leading-relaxed">
                        感謝您使用慈濟短網址平台。依據執行長建議及資安政策，系統將進行以下調整：
                    </p>

                    <div class="space-y-4">
                        <!-- Item 1 - 已完成 -->
                        <div class="flex gap-3">
                            <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-green-500/20 flex items-center justify-center">
                                <span class="material-symbols-outlined text-green-400 text-lg">check_circle</span>
                            </div>
                            <div>
                                <h3 class="text-white text-sm font-medium">帳號系統 ✓</h3>
                                <p class="text-white/80 text-xs mt-0.5">整合慈濟員工帳號，停用 Gmail 及一般帳密登入</p>
                            </div>
                        </div>

                        <!-- Item 2 -->
                        <div class="flex gap-3">
                            <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary text-lg">link</span>
                            </div>
                            <div>
                                <h3 class="text-white text-sm font-medium">網址優化</h3>
                                <p class="text-white/80 text-xs mt-0.5">評估更簡短、易識別的短網址域名</p>
                            </div>
                        </div>

                        <!-- Item 3 -->
                        <div class="flex gap-3">
                            <div class="flex-shrink-0 w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
                                <span class="material-symbols-outlined text-primary text-lg">qr_code_2</span>
                            </div>
                            <div>
                                <h3 class="text-white text-sm font-medium">QR Code 識別</h3>
                                <p class="text-white/80 text-xs mt-0.5">規劃導入慈濟標準 Logo 提升識別度</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Right: Login -->
                <div class="p-6 sm:p-8 flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-6">
                        <span class="material-symbols-outlined text-primary">login</span>
                        <h2 class="text-white text-xl font-bold">帳號登入</h2>
                    </div>

                    <!-- Error Message -->
                    <div id="errorMessage" class="hidden mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
                    </div>

                    <p class="text-white/90 text-sm mb-6">
                        請使用慈濟員工帳號進行登入，系統將透過內部認證服務驗證您的身份。
                    </p>

                    <!-- Keycloak Login Button -->
                    <button
                        type="button"
                        id="keycloakLoginBtn"
                        class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-lg h-14 px-5 bg-primary hover:bg-blue-600 transition-colors text-white text-lg font-medium shadow-[0_0_20px_theme(colors.primary/0.4)]"
                    >
                        <span class="material-symbols-outlined text-2xl">badge</span>
                        <span id="keycloakBtnText">慈濟員工登入</span>
                        <span id="keycloakBtnLoading" class="hidden">
                            <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                            </svg>
                        </span>
                    </button>

                    <div class="flex items-center gap-2 mt-4 text-white/80 text-xs">
                        <span class="material-symbols-outlined text-sm">shield</span>
                        <span>透過慈濟內部認證系統安全登入</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Back to Home -->
        <div class="mt-6 text-center">
            <a href="/" class="text-white/80 hover:text-white/90 text-sm transition-colors inline-flex items-center gap-1">
                <span class="material-symbols-outlined text-lg">arrow_back</span>
                返回首頁
            </a>
        </div>
    </div>

    <!-- Auth Script -->
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 檢查是否已登入
            await auth.init()
            const isLoggedIn = await auth.isLoggedIn()
            if (isLoggedIn) {
                window.location.href = getRedirectUrl()
                return
            }

            const errorMessage = document.getElementById('errorMessage')
            const keycloakLoginBtn = document.getElementById('keycloakLoginBtn')
            const keycloakBtnText = document.getElementById('keycloakBtnText')
            const keycloakBtnLoading = document.getElementById('keycloakBtnLoading')

            // Keycloak 登入（慈濟員工）
            keycloakLoginBtn.addEventListener('click', async () => {
                // 重置訊息
                errorMessage.classList.add('hidden')

                // 顯示載入狀態
                keycloakLoginBtn.disabled = true
                keycloakBtnText.classList.add('hidden')
                keycloakBtnLoading.classList.remove('hidden')

                try {
                    await auth.signInWithKeycloak(getRedirectUrl())
                } catch (error) {
                    console.error('Keycloak login error:', error)
                    errorMessage.textContent = '登入失敗，請稍後再試'
                    errorMessage.classList.remove('hidden')

                    // 重置按鈕
                    keycloakLoginBtn.disabled = false
                    keycloakBtnText.classList.remove('hidden')
                    keycloakBtnLoading.classList.add('hidden')
                }
            })
        })
    </script>
</body>
</html>
