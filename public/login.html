<!DOCTYPE html>
<html class="dark" lang="zh-TW">
<head>
    <meta charset="utf-8"/>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>登入 - TCurl 慈濟短網址服務</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#1337ec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings:
            'FILL' 0,
            'wght' 400,
            'GRAD' 0,
            'opsz' 24
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-sm">
        <!-- Logo & Title -->
        <div class="flex flex-col items-center gap-4 mb-8">
            <img src="/favicon.svg" alt="TCurl Logo" class="w-16 h-auto">
            <div class="text-center">
                <div class="flex items-center justify-center gap-2">
                    <h1 class="text-white text-3xl font-bold">TCurl</h1>
                    <span id="version-badge" class="px-1.5 py-0.5 text-xs font-bold bg-blue-500 text-white rounded"></span>
                </div>
                <p class="text-white/60 text-sm mt-1">慈濟短網址服務</p>
            </div>
        </div>

        <!-- Login Card -->
        <div class="rounded-xl border border-white/10 bg-white/5 shadow-2xl shadow-black/20 p-6 sm:p-8">
            <!-- Error Message -->
            <div id="errorMessage" class="hidden mb-4 p-3 rounded-lg bg-red-500/20 border border-red-500/50 text-red-400 text-sm">
            </div>

            <p class="text-white/70 text-sm mb-6 text-center">
                請使用慈濟員工帳號進行登入
            </p>

            <!-- Keycloak Login Button -->
            <button
                type="button"
                id="keycloakLoginBtn"
                class="flex w-full cursor-pointer items-center justify-center gap-3 rounded-lg h-14 px-5 bg-primary hover:bg-blue-600 transition-colors text-white text-lg font-medium shadow-[0_0_20px_theme(colors.primary/0.4)]"
            >
                <span class="material-symbols-outlined text-2xl">badge</span>
                <span id="keycloakBtnText">慈濟員工登入</span>
                <span id="keycloakBtnLoading" class="hidden">
                    <svg class="animate-spin h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                    </svg>
                </span>
            </button>

            <div class="flex items-center justify-center gap-2 mt-4 text-white/50 text-xs">
                <span class="material-symbols-outlined text-sm">shield</span>
                <span>透過慈濟內部認證系統安全登入</span>
            </div>
        </div>

    </div>

    <!-- Auth Script -->
    <script src="/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            // 檢查是否已登入
            await auth.init()
            const isLoggedIn = await auth.isLoggedIn()
            if (isLoggedIn) {
                window.location.href = getRedirectUrl()
                return
            }

            const errorMessage = document.getElementById('errorMessage')
            const keycloakLoginBtn = document.getElementById('keycloakLoginBtn')
            const keycloakBtnText = document.getElementById('keycloakBtnText')
            const keycloakBtnLoading = document.getElementById('keycloakBtnLoading')

            // Keycloak 登入（慈濟員工）
            keycloakLoginBtn.addEventListener('click', async () => {
                // 重置訊息
                errorMessage.classList.add('hidden')

                // 顯示載入狀態
                keycloakLoginBtn.disabled = true
                keycloakBtnText.classList.add('hidden')
                keycloakBtnLoading.classList.remove('hidden')

                try {
                    await auth.signInWithKeycloak(getRedirectUrl())
                } catch (error) {
                    console.error('Keycloak login error:', error)
                    errorMessage.textContent = '登入失敗，請稍後再試'
                    errorMessage.classList.remove('hidden')

                    // 重置按鈕
                    keycloakLoginBtn.disabled = false
                    keycloakBtnText.classList.remove('hidden')
                    keycloakBtnLoading.classList.add('hidden')
                }
            })
        })
    </script>
    <script>
        fetch('/api/version').then(r => r.json()).then(d => {
            document.getElementById('version-badge').textContent = 'v' + d.version
        }).catch(() => {})
    </script>
</body>
</html>
